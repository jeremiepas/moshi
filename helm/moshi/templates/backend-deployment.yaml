{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moshi.fullname" . }}-backend
  labels:
    {{- include "moshi.backendLabels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "moshi.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moshi.backendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "moshi.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-model
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for model download to complete..."
              until [ -f /models/download-complete ]; do
                echo "Model not ready yet, waiting..."
                sleep 10
              done
              echo "Model is ready!"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8998
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          {{- if .Values.backend.gpu.enabled }}
          resources:
            limits:
              {{- if .Values.backend.gpu.shared }}
              nvidia.com/gpu.shared: {{ .Values.backend.gpu.count }}
              {{- else }}
              nvidia.com/gpu: {{ .Values.backend.gpu.count }}
              {{- end }}
              memory: {{ .Values.backend.resources.limits.memory }}
              cpu: {{ .Values.backend.resources.limits.cpu }}
            requests:
              memory: {{ .Values.backend.resources.requests.memory }}
              cpu: {{ .Values.backend.resources.requests.cpu }}
          {{- else }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- end }}
          env:
            - name: HF_REPO
              value: {{ .Values.model.hfRepo }}
            - name: HF_HOME
              value: /models/.cache
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: max_split_size_mb:512
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "moshi.fullname" . }}-models
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}