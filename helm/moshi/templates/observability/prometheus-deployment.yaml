{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moshi.prometheus.fullname" . }}
  labels:
    {{- include "moshi.prometheus.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "moshi.prometheus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moshi.prometheus.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "moshi.observability.serviceAccountName" . }}
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        # Prometheus server for scraping metrics
        - name: prometheus
          image: "{{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.observability.prometheus.retention | default "15d" }}"
            - "--web.enable-lifecycle"
          ports:
            - name: web
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              memory: {{ .Values.observability.prometheus.resources.limits.memory | default "2Gi" }}
              cpu: {{ .Values.observability.prometheus.resources.limits.cpu | default "500m" }}
            requests:
              memory: {{ .Values.observability.prometheus.resources.requests.memory | default "1Gi" }}
              cpu: {{ .Values.observability.prometheus.resources.requests.cpu | default "250m" }}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
        
        # Metrics sidecar for parsing Moshi logs
        - name: metrics-sidecar
          image: python:3.10-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              pip install prometheus_client
              python /scripts/log_parser.py
          volumeMounts:
            - name: log-parser-scripts
              mountPath: /scripts
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: prometheus-config
          configMap:
            name: {{ include "moshi.prometheus.fullname" . }}-config
        - name: prometheus-storage
          {{- if .Values.observability.prometheus.storage.enabled | default false }}
          persistentVolumeClaim:
            claimName: {{ include "moshi.prometheus.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: log-parser-scripts
          configMap:
            name: {{ include "moshi.prometheus.fullname" . }}-config
            items:
              - key: log-patterns.yml
                path: log_parser.py
{{- end }}