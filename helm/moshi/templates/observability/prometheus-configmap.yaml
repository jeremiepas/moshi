{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "moshi.prometheus.fullname" . }}-config
  labels:
    {{- include "moshi.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.prometheus.scrapeInterval | default "15s" }}
      scrape_timeout: {{ .Values.observability.prometheus.scrapeTimeout | default "10s" }}
    
    scrape_configs:
      # Scrape Prometheus sidecar metrics from Moshi backend pods
      - job_name: 'moshi-metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Only scrape pods with moshi-backend label
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: backend
          # Scrape metrics from the sidecar port
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(:\d+)?
            replacement: ${1}:9090
            target_label: __address__
        metrics_path: /metrics

  log-patterns.yml: |
    # Log pattern matching rules for Moshi backend logs
    # These patterns extract metrics from Moshi log output
    
    patterns:
      # Text tokens generated
      - pattern: "text token '(.*?)'"
        metric: moshi_text_tokens_total
        type: counter
        help: "Total number of text tokens generated by Moshi"
        
      # Token throughput
      - pattern: "steps: (\\d+), token per sec: ([\\d.]+)"
        metric: moshi_tokens_per_sec
        type: gauge
        help: "Token throughput in tokens per second"
        capture_groups:
          steps: 1
          rate: 2
        
      # Audio frames processed
      - pattern: "audio_frame"
        metric: moshi_audio_frames_total
        type: counter
        help: "Total number of audio frames processed"
        
      # Inference latency (if logged)
      - pattern: "inference_latency_ms: ([\\d.]+)"
        metric: moshi_inference_latency_seconds
        type: gauge
        help: "Inference latency in seconds"
        capture_groups:
          latency: 1
        transform:
          # Convert ms to seconds
          operation: divide
          value: 1000
{{- end }}