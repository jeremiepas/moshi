{{- if .Values.modelDownload.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "moshi.fullname" . }}-model-download
  labels:
    {{- include "moshi.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-download
spec:
  template:
    metadata:
      labels:
        {{- include "moshi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: model-download
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pvc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PVC to be available..."
              until [ -d /models ]; do
                echo "PVC not ready yet, waiting..."
                sleep 5
              done
              echo "PVC is ready!"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: download
          image: "{{ .Values.model.downloader.image.repository }}:{{ .Values.model.downloader.image.tag }}"
          imagePullPolicy: {{ .Values.model.downloader.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Starting model download..."
              echo "Target repository: {{ .Values.model.hfRepo }}"
              
              # Install huggingface_hub
              pip install -q huggingface-hub safetensors
              
              # Download model
              python3 -c "
              from huggingface_hub import snapshot_download
              import os
              
              repo_id = '{{ .Values.model.hfRepo }}'
              local_dir = '/models/moshi'
              
              print(f'Downloading {repo_id} to {local_dir}...')
              
              os.makedirs(local_dir, exist_ok=True)
              
              snapshot_download(
                  repo_id=repo_id,
                  local_dir=local_dir,
                  local_dir_use_symlinks=False,
                  resume_download=True
              )
              
              print('Download complete!')
              print('Contents:')
              for f in os.listdir(local_dir):
                  print(f'  - {f}')
              "
              
              echo "Model download completed successfully!"
              
              # Create completion marker
              touch /models/download-complete
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: model-storage
              mountPath: /models
          env:
            - name: HF_HOME
              value: /models/.cache
            - name: TRANSFORMERS_CACHE
              value: /models/.cache
      volumes:
        - name: model-storage
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "moshi.fullname" . }}-models
          {{- end }}
  {{- if .Values.modelDownload.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.modelDownload.ttlSecondsAfterFinished }}
  {{- end }}
{{- end }}
